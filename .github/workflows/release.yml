name: Release
on:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.*'
          arch: win64_msvc2022_64
          modules: qtshadertools

      - name: Configure
        run: cmake -B build -S . -G "Visual Studio 17 2022" -A x64

      - name: Build
        run: cmake --build build --config Release --target mediaflow

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MediaFlow-Windows-Release
          path: build/Release/MediaFlow.exe
